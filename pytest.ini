[pytest]
# Without asyncio_mode=auto, every `async def test_...` is SILENTLY SKIPPED
# with a warning you will not read. This is the single most common way people
# ship an async test suite that tests nothing.
asyncio_mode = auto
testpaths = tests
# Bare `pytest` does NOT put the repo root on sys.path — `python -m pytest`
# does, which is why "works on my machine" survived until the first CI run.
# This line makes `from app...` importable however the suite is invoked.
pythonpath = .
